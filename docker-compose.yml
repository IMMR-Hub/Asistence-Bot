services:
  db:
    image: postgres:15-alpine
    container_name: salesbot_db
    environment:
      POSTGRES_USER: salesbot
      POSTGRES_PASSWORD: salesbot_secret
      POSTGRES_DB: salesbot_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salesbot_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: salesbot_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salesbot_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesbot_api
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - salesbot_network
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesbot_worker
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - salesbot_network
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    command: python -m app.workers.worker

volumes:
  postgres_data:
  redis_data:

networks:
  salesbot_network:
    driver: bridge
